[program:psbot-migration]
process_name=%(program_name)s_%(process_num)02d
directory=/var/www/psbot
command=/usr/bin/php /var/www/psbot/artisan queue:work worker --queue=migration --once --sleep=10
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/psbot-worker_%(process_num)02d.log
stopwaitsecs=3600
startsecs=0
