[program:psbot-bot]
process_name=%(program_name)s_%(process_num)02d
directory=/var/www/psbot
command=/usr/bin/php /var/www/psbot/artisan app:start-bot-instance-command
startsecs=5
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=5
redirect_stderr=true
stdout_logfile=/var/log/supervisor/psbot-bot_%(process_num)02d.log
stopwaitsecs=3600
stopsignal=TERM
